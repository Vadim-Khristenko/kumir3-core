#[package]
#name = "kumir3-core"
#version = "0.1.0"
#edition = "2024"
#description = "Kumir 3 - Core Library"
#authors = ["Vadim Khristenko <just@vai-prog.ru>"]
#license-file = "LICENSE"
#repository = "https://github.com/Vadim-Khristenko/kumir3-core"
#default-run = "kumir3-cli"
#readme = "README.md"
#keywords = ["kumir3", "kumir", "kumir3-core", "core", "library"]

# This is virtual manifest so no there's no need for this

[workspace.dependencies]
once_cell = "1.21"
lazy_static = "1.5"
dirs = "6.0"
tokio = { version = "1.49.0", features = ["full"] }
toml = "0.8"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.148"
tokio-rustls = "0.26.4"
rustls = "0.23.36"
webpki-roots = "1.0.5"
rustls-pemfile = "2.2.0"
clap = { version = "4.5", features = ["derive", "color"] }
colored = "3.1"
ratatui = "0.30.0"
crossterm = "0.29"

[workspace]
members = ["compiler", "interpreter", "shared", "tests"]
resolver = "2"

#[lib]
# Суффикс lib может показаться лишним, но поверь мне он необходим, 
# чтобы имя библиотеки было уникальным и не конфликтовало с именем бинарника.
# Это может быть только на Windows (любим за рандомную хрень ОС), посмотри https://github.com/rust-lang/cargo/issues/8519
#name = "crate"
#crate-type = ["staticlib", "cdylib", "rlib"]

#[[bin]]
#name = "kumir3-interpreter"
#path = "src/kum_interpreter.rs"
#tests = false

#[[bin]]
#name = "kumir3-compiler"
#path = "src/kum_compiler.rs"
#tests = false

#[[bin]]
#name = "kumir3-cli"
#path = "src/kum_cli.rs"

#[[test]]
#name = "kumir3-tests"
#path = "tests/tests.rs"
